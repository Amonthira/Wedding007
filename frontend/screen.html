<head>

<link rel="stylesheet" href="style.css">

<body class="screen">

<div class="couple">

</div>

</div>

</div>

<script>

let wishes=[]
let index=0

async function loadWishes(){

const res = await fetch("async function sendWish(){

if(!guestName || !message){

}
const res = await fetch("https://wedding007-production.up.railway.app/api/wishes",{

`

location.reload()
}")
const data = await res.json()

wishes = data.data

}

function showWish(){

if(wishes.length===0)return

const box = document.getElementById("wishBox")

box.style.opacity = 0

setTimeout(()=>{

const wish = wishes[index]
